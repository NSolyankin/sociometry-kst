<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Портал опросов КСТ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #1d1d1f;
    --muted: #6e6e73;
    --border: #d2d2d7;
    --accent: #0071e3;
    --accent-hover: #0077ed;
    --danger: #ff3b30;
    --success: #34c759;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 0;
    min-height: 100vh;
  }
  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
  }
  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    margin-bottom: 16px;
  }
  h1 { font-size: 24px; margin: 0 0 8px 0; }
  h2 { font-size: 18px; margin: 0 0 12px 0; }
  p { margin: 8px 0; color: var(--muted); }
  label {
    display: block;
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input[type="email"], input[type="password"], input[type="text"] {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 16px;
    margin-bottom: 12px;
    background: #fff;
    color: var(--text);
  }
  input:focus { outline: none; border-color: var(--accent); }
  button {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    font-weight: 500;
  }
  button:hover { background: var(--accent-hover); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.secondary {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--border);
  }
  button.secondary:hover { background: #f0f0f0; }
  button.danger { background: var(--danger); }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
    background: #e8e8ed;
    color: var(--muted);
  }
  .badge.organizer { background: #fff3cd; color: #856404; }
  .badge.participant { background: #d1ecf1; color: #0c5460; }
  .error {
    background: #ffe6e6;
    color: var(--danger);
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 12px;
    font-size: 14px;
  }
  .info {
    background: #e8f4ff;
    color: #004085;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 12px;
    font-size: 14px;
  }
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .link-btn {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    padding: 0;
    font-size: 14px;
    text-decoration: underline;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="container">

  <!-- ============ ЭКРАН ВХОДА ============ -->
  <div id="screen-login" class="card hidden">
    <h1>Портал опросов КСТ</h1>
    <p>Группа 161</p>
    <div id="login-error" class="error hidden"></div>
    <label>Email</label>
    <input type="email" id="login-email" autocomplete="email">
    <label>Пароль</label>
    <input type="password" id="login-password" autocomplete="current-password">
    <button id="btn-login">Войти</button>
    <p style="margin-top: 16px;">
      <button class="link-btn" id="btn-forgot">Забыли пароль?</button>
    </p>
  </div>

  <!-- ============ ЭКРАН ДАШБОРДА ============ -->
  <div id="screen-dashboard" class="hidden">
    <div class="card">
      <div class="header">
        <div>
          <h1>Портал опросов КСТ</h1>
          <p>
            <span id="user-pseudonym">—</span>
            <span class="badge" id="user-role-badge">—</span>
          </p>
        </div>
        <button class="secondary" id="btn-logout">Выйти</button>
      </div>
    </div>

    <div class="card">
      <div class="header">
        <h2>Опросы группы</h2>
        <button id="btn-new-survey" class="hidden">+ Новый опрос</button>
      </div>
      <div id="surveys-list">
        <div class="empty-state">
          Здесь будет список опросов.<br>
          <small>(Шаг 2: каркас. Создание и просмотр опросов появятся в шаге 3.)</small>
        </div>
      </div>
    </div>
  </div>

  <!-- ============ ЭКРАН ЗАГРУЗКИ ============ -->
  <div id="screen-loading" class="card">
    <p>Загрузка…</p>
  </div>

</div>

<script>
// ============================================================
// КОНФИГУРАЦИЯ
// ============================================================
const SUPABASE_URL = 'https://nxxjbiwrkrlylpfypzvi.supabase.co';
const SUPABASE_KEY = 'sb_publishable_k_Cy89H33YGxyrZn-tsJBg__b0feVAY';

let sb = null;
let currentUser = null;
let currentProfile = null;
let pollingInterval = null;

// ============================================================
// СОЗДАНИЕ КЛИЕНТА SUPABASE С УНИКАЛЬНЫМ STORAGEKEY
// ============================================================
function createSbClient() {
  const uniqueKey = 'sb-portal-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
  console.log('[boot] creating sb client with storageKey=' + uniqueKey);
  return supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
    auth: {
      storageKey: uniqueKey,
      persistSession: true,
      autoRefreshToken: true,
      detectSessionInUrl: false
    }
  });
}

// ============================================================
// ЖЁСТКИЙ ЛОКАЛЬНЫЙ ВЫХОД
// Полностью чистит localStorage от sb-* и пересоздаёт клиент
// ============================================================
function hardLocalLogout() {
  console.log('[hardLogout] start');
  try {
    const keysToRemove = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('sb-')) keysToRemove.push(k);
    }
    keysToRemove.forEach(k => {
      console.log('[hardLogout] removing ' + k);
      localStorage.removeItem(k);
    });
  } catch (e) {
    console.error('[hardLogout] localStorage error:', e);
  }
  stopPolling();
  sb = createSbClient();
  currentUser = null;
  currentProfile = null;
  console.log('[hardLogout] done');
}

// ============================================================
// POLLING (заглушка — пока ничего не запрашивает)
// ============================================================
function startPolling() {
  if (pollingInterval) return;
  console.log('[polling] start');
  pollingInterval = setInterval(() => {
    console.log('[polling] tick');
    // в шаге 3 сюда добавится загрузка опросов
  }, 10000);
}

function stopPolling() {
  if (pollingInterval) {
    console.log('[polling] stop');
    clearInterval(pollingInterval);
    pollingInterval = null;
  }
}

// ============================================================
// ПЕРЕКЛЮЧЕНИЕ ЭКРАНОВ
// ============================================================
function showScreen(name) {
  console.log('[ui] show screen: ' + name);
  document.getElementById('screen-login').classList.add('hidden');
  document.getElementById('screen-dashboard').classList.add('hidden');
  document.getElementById('screen-loading').classList.add('hidden');
  document.getElementById('screen-' + name).classList.remove('hidden');
}

// ============================================================
// ЗАГРУЗКА ПРОФИЛЯ ПОЛЬЗОВАТЕЛЯ
// ============================================================
async function loadProfile(userId) {
  console.log('[profile] loading for ' + userId);
  const { data, error } = await sb
    .from('profiles')
    .select('*')
    .eq('id', userId)
    .maybeSingle();
  if (error) {
    console.error('[profile] error:', error);
    return null;
  }
  console.log('[profile] loaded:', data);
  return data;
}

// ============================================================
// ОТРИСОВКА ДАШБОРДА
// ============================================================
function renderDashboard() {
  const pseudonym = currentProfile?.pseudonym || '(без псевдонима)';
  const role = currentProfile?.role || 'participant';
  document.getElementById('user-pseudonym').textContent = pseudonym;

  const badge = document.getElementById('user-role-badge');
  if (role === 'main_organizer') {
    badge.textContent = 'Главный организатор';
    badge.className = 'badge organizer';
  } else if (role === 'co_organizer') {
    badge.textContent = 'Со-организатор';
    badge.className = 'badge organizer';
  } else {
    badge.textContent = 'Участник';
    badge.className = 'badge participant';
  }

  const isOrganizer = (role === 'main_organizer' || role === 'co_organizer');
  document.getElementById('btn-new-survey').classList.toggle('hidden', !isOrganizer);

  showScreen('dashboard');
}

// ============================================================
// ВХОД
// ============================================================
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errorBox = document.getElementById('login-error');
  errorBox.classList.add('hidden');

  if (!email || !password) {
    errorBox.textContent = 'Введите email и пароль';
    errorBox.classList.remove('hidden');
    return;
  }

  console.log('[login] attempt for ' + email);
  // Превентивный жёсткий выход — чистим возможные следы прошлой сессии
  hardLocalLogout();

  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    console.error('[login] error:', error);
    errorBox.textContent = 'Ошибка входа: ' + error.message;
    errorBox.classList.remove('hidden');
    return;
  }
  console.log('[login] success');
  currentUser = data.user;
  currentProfile = await loadProfile(currentUser.id);
  if (!currentProfile) {
    errorBox.textContent = 'Профиль не найден. Обратитесь к организатору.';
    errorBox.classList.remove('hidden');
    return;
  }
  startPolling();
  renderDashboard();
}

// ============================================================
// ВЫХОД (через жёсткий локальный выход, без sb.auth.signOut)
// ============================================================
function doLogout() {
  console.log('[logout] start');
  hardLocalLogout();
  document.getElementById('login-email').value = '';
  document.getElementById('login-password').value = '';
  showScreen('login');
  console.log('[logout] done');
}

// ============================================================
// СБРОС ПАРОЛЯ
// ============================================================
async function doForgotPassword() {
  const email = document.getElementById('login-email').value.trim();
  const errorBox = document.getElementById('login-error');
  errorBox.classList.add('hidden');
  if (!email) {
    errorBox.textContent = 'Введите email в поле выше, затем нажмите «Забыли пароль»';
    errorBox.classList.remove('hidden');
    return;
  }
  const { error } = await sb.auth.resetPasswordForEmail(email);
  if (error) {
    errorBox.textContent = 'Ошибка: ' + error.message;
    errorBox.classList.remove('hidden');
    return;
  }
  errorBox.className = 'info';
  errorBox.textContent = 'Письмо для сброса пароля отправлено на ' + email;
  errorBox.classList.remove('hidden');
}

// ============================================================
// ИНИЦИАЛИЗАЦИЯ
// ============================================================
async function init() {
  console.log('[boot] init start');
  sb = createSbClient();

  // Проверяем, есть ли уже активная сессия
  const { data: { session } } = await sb.auth.getSession();
  if (session && session.user) {
    console.log('[boot] existing session found for ' + session.user.email);
    currentUser = session.user;
    currentProfile = await loadProfile(currentUser.id);
    if (currentProfile) {
      startPolling();
      renderDashboard();
      return;
    }
    console.log('[boot] profile not found, falling to login');
  }
  showScreen('login');
}

// ============================================================
// ПРИВЯЗКА ОБРАБОТЧИКОВ
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('btn-login').addEventListener('click', doLogin);
  document.getElementById('btn-logout').addEventListener('click', doLogout);
  document.getElementById('btn-forgot').addEventListener('click', doForgotPassword);
  document.getElementById('login-password').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doLogin();
  });
  init();
});
</script>

</body>
</html>
